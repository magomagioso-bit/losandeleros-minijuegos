<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
  }

  body{
    height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
  }

  .box{
    padding:30px;
    border:1px solid #111;
    background:#0a0a0a;
    border-radius:12px;
    box-shadow:0 0 20px #00aaff22;
    max-width:600px;
  }

  h1{
    color:#00aaff;
    font-size:32px;
    text-shadow:0 0 12px #00aaff;
  }

  p{
    margin-top:15px;
    color:#bbb;
    line-height:1.5;
  }

  .dot{
    margin-top:20px;
    color:#00aaff;
    font-weight:bold;
    animation:blink 1.2s infinite;
  }

  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.2;}
  }
</style>
</head>

<body>

  <div class="box">
    <h1>🚧 Mantenimiento en curso</h1>
    <p>
      Estamos mejorando la plataforma para ofrecer una mejor experiencia.<br>
      Vuelve más tarde.
    </p>

    <div class="dot">● ● ●</div>
  </div>

</body>
</html>
