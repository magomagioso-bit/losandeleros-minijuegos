<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuegos del Clan</title>
<style>
  body {
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 10px;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
  }

  #nivelBox {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 25px;
    font-size: 22px;
    border: 2px solid #ffcc00;
    display: inline-block;
  }

  button {
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    width: 260px;
    background: #222;
    color: white;
    border: 2px solid #555;
    transition: 0.2s;
  }

  button:hover {
    background: #ffcc00;
    color: black;
    border-color: #ffcc00;
    transform: scale(1.05);
  }

  .locked {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Partículas dopamina */
  .particle {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #ffcc00;
    border-radius: 50%;
    pointer-events: none;
    animation: fly 1s linear forwards;
  }

  @keyframes fly {
    from { transform: translateY(0) scale(1); opacity: 1; }
    to { transform: translateY(-150px) scale(0.2); opacity: 0; }
  }
</style>
</head>
<body>

<h1>🎮 Minijuegos del Clan</h1>

<div id="nivelBox">Nivel actual: <span id="nivel">1</span></div>

<h2>Selecciona un nivel</h2>

<div id="botones"></div>

<script>
/* -------------------------
   SISTEMA DE NIVELES
-------------------------- */
let nivel = Number(localStorage.getItem("nivel")) || 1;
document.getElementById("nivel").textContent = nivel;

/* -------------------------
   LISTA DE MINIJUEGOS
-------------------------- */
const juegos = [
  { nombre: "Nivel 1: Snake", archivo: "snake.html" },
  { nombre: "Nivel 2: Pong", archivo: "pong.html" },
  { nombre: "Nivel 3: Memory", archivo: "memory.html" },
  { nombre: "Nivel 4: Laberinto", archivo: "laberinto.html" },
  { nombre: "Nivel 5: Obstáculos", archivo: "obstaculos.html" },
  { nombre: "Nivel 6: Simon Dice", archivo: "simondice.html" }
];

/* -------------------------
   CREAR BOTONES
-------------------------- */
const cont = document.getElementById("botones");

juegos.forEach((juego, i) => {
  const btn = document.createElement("button");
  btn.textContent = juego.nombre;

  if (i + 1 > nivel) {
    btn.classList.add("locked");
  } else {
    btn.onclick = () => {
      dopamina();
      setTimeout(() => window.location.href = juego.archivo, 300);
    };
  }

  cont.appendChild(btn);
});

/* -------------------------
   EFECTO DOPAMINA
-------------------------- */
function dopamina() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = (window.innerWidth / 2 + (Math.random() * 100 - 50)) + "px";
    p.style.top = (window.innerHeight / 2) + "px";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}
</script>

</body>
</html>
