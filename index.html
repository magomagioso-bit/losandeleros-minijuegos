<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuegos con Niveles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TARJETAS SUPERIORES -->
<div id="nivelBox" class="card-top">Nivel actual: <span id="nivel">1</span></div>
<div id="xpBox" class="card-top">XP: <span id="xp">0</span></div>

<!-- MENÚ PRINCIPAL -->
<div id="menu" class="panel active">
  <h1>Minijuegos</h1>

  <button onclick="jugar(1)">Nivel 1: Adivina</button>
  <button onclick="jugar(2)" id="btn2" class="locked">Nivel 2: Buscaminas</button>
  <button onclick="jugar(3)" id="btn3" class="locked">Nivel 3: 3 en Raya</button>
  <button onclick="jugar(4)" id="btn4" class="locked">Nivel 4: Snake</button>
  <button onclick="jugar(5)" id="btn5" class="locked">Nivel 5: Flappy Bird</button>
  <button onclick="jugar(6)" id="btn6" class="locked">Nivel 6: Dino Runner</button>

  <button onclick="localStorage.clear(); location.reload();">Reiniciar progreso</button>
</div>

<!-- NIVEL 1: ADIVINA -->
<div id="nivel1" class="panel">
  <h2>Adivina el Número</h2>
  <button onclick="volverMenu()">Volver</button>
  <input type="number" id="num">
  <button onclick="comprobar()">Probar</button>
  <p id="msg1"></p>
</div>
  
<!-- NIVEL 2: BUSCAMINAS -->
<h2>Nivel 2 – Buscaminas</h2>

<div id="minesOptions">
  <label>Elige dificultad:</label>
  <select id="minesDifficulty" onchange="iniciarBuscaminas()">
    <option value="6x6">Fácil (6×6, 6 minas)</option>
    <option value="8x8">Principiante (8×8, 10 minas)</option>
    <option value="12x12">Intermedio (12×12, 20 minas)</option>
    <option value="16x16">Experto (16×16, 40 minas)</option>
  </select>
</div>

<div id="minesGrid"></div>

<p id="msg2"></p>

<!-- NIVEL 3: 3 EN RAYA -->
<div id="nivel3" class="panel">
  <h2>3 en Raya</h2>
  <button onclick="volverMenu()">Volver</button>
  <div id="tablero"></div>
  <p id="msg3"></p>
</div>

<!-- NIVEL 4: SNAKE -->
<div id="nivel4" class="panel">
  <h2>Snake</h2>
  <button onclick="volverMenu()">Volver</button>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>
  <p id="msg4"></p>
</div>

<!-- NIVEL 5: FLAPPY BIRD -->
<div id="nivel5" class="panel">
  <h2>Flappy Bird</h2>
  <button onclick="volverMenu()">Volver</button>

  <div id="flappyGame">
    <div id="flappyBird" class="bird-frame-1"></div>
    <div id="pipeTop" class="pipe"></div>
    <div id="pipeBottom" class="pipe"></div>
    <div id="ground"></div>
    <div id="startScreen">Pulsa para empezar</div>
    <div id="gameOverScreen">GAME OVER</div>
  </div>

  <p>Puntuación: <span id="flappyScore">0</span></p>
  <p id="msg5"></p>
</div>

<!-- NIVEL 6: DINO RUNNER -->
<div id="nivel6" class="panel">
  <h2>Dino Runner</h2>
  <button onclick="volverMenu()">Volver</button>

  <div id="dinoGame">
    <div id="dino"></div>
    <div id="cactus"></div>
  </div>

  <p>Puntuación: <span id="dinoScore">0</span></p>
  <p id="msg6"></p>
</div>
<script>
/* ============================
   SISTEMA DE NIVELES
============================ */
let nivel = Number(localStorage.getItem("nivel") || 1);
let xp = Number(localStorage.getItem("xp") || 0);

document.getElementById("nivel").textContent = nivel;
document.getElementById("xp").textContent = xp;

function guardar() {
  localStorage.setItem("nivel", nivel);
  localStorage.setItem("xp", xp);
}

function ganarXP(c) {
  xp += c;
  document.getElementById("xp").textContent = xp;
  guardar();
}

function victoria(n) {
  ganarXP(100);
  nivel++;
  guardar();
  alert("¡Nivel " + n + " completado!");
  volverMenu();
}

/* ============================
   PANEL SYSTEM
============================ */
function ocultar() {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
}

function mostrar(id) {
  ocultar();
  const panel = document.getElementById(id);
  panel.classList.add("active");

  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}


function volverMenu() {
  mostrar("menu");
  actualizarBotones();
}

function actualizarBotones() {
  if (nivel >= 2) btn2.classList.remove("locked");
  if (nivel >= 3) btn3.classList.remove("locked");
  if (nivel >= 4) btn4.classList.remove("locked");
  if (nivel >= 5) btn5.classList.remove("locked");
  if (nivel >= 6) btn6.classList.remove("locked");
}

actualizarBotones();

/* ============================
   JUGAR
============================ */
function jugar(n) {
  mostrar("nivel" + n);
  if (n === 2) iniciarBuscaminas();
  if (n === 3) iniciar3Raya();
  if (n === 4) iniciarSnake();
  if (n === 5) iniciarFlappy();
  if (n === 6) iniciarDino();
}

/* ============================
   NIVEL 1 – ADIVINA
============================ */

let secreto;
let intentos;

function iniciarAdivina() {
  // Generar número nuevo cada vez que entras al nivel
  secreto = Math.floor(Math.random() * 50) + 1;
  intentos = 0;

  msg1.textContent = "Escribe un número 1–50";
  msg1.style.color = "#fff";

  const input = document.getElementById("num");
  input.value = "";
  input.disabled = false;

  const btn = document.getElementById("btnComprobar");
  btn.disabled = false;
}

function comprobar() {
  const input = document.getElementById("num");
  const n = Number(input.value);

  // Validación 1–50
  if (n < 1 || n > 50 || isNaN(n)) {
    msg1.textContent = "Introduce un número válido entre 1 y 50";
    msg1.style.color = "orange";
    input.value = "";
    return;
  }

  intentos++;

  if (n === secreto) {
    msg1.innerHTML = `<span class="victoria">¡Correcto! Intentos: ${intentos}</span>`;
    msg1.style.color = "lime";

    // Bloquear input al ganar
    input.disabled = true;
    document.getElementById("btnComprobar").disabled = true;

    setTimeout(() => victoria(1), 800);
  } else {
    msg1.textContent = n < secreto ? "Más alto" : "Más bajo";
    msg1.style.color = "red";
    input.value = "";
  }
}

function reiniciarAdivina() {
  iniciarAdivina();
}

/* ============================
   NIVEL 2 – BUSCAMINAS PRO
============================ */

function iniciarBuscaminas() {
  const grid = document.getElementById("minesGrid");
  const diff = document.getElementById("minesDifficulty").value;

  // Ajustes visuales (sin tocar tu CSS)
  grid.style.pointerEvents = "auto";
  grid.style.maxHeight = "300px";
  grid.style.overflowY = "auto";
  grid.style.gridGap = "2px";

  let size, mineCount;

  if (diff === "6x6") { size = 6; mineCount = 6; }
  if (diff === "8x8") { size = 8; mineCount = 10; }
  if (diff === "12x12") { size = 12; mineCount = 20; }
  if (diff === "16x16") { size = 16; mineCount = 40; }

  grid.style.gridTemplateColumns = `repeat(${size}, 30px)`;
  grid.innerHTML = "";
  msg2.textContent = "";

  const total = size * size;
  const mines = new Set();
  let minesGameOver = false;

  while (mines.size < mineCount) mines.add(Math.floor(Math.random() * total));

  const cells = [];

  function countMinesAround(i) {
    const x = i % size;
    const y = Math.floor(i / size);
    let count = 0;

    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;

        const nx = x + dx;
        const ny = y + dy;

        if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
          const ni = ny * size + nx;
          if (mines.has(ni)) count++;
        }
      }
    }
    return count;
  }

  function reveal(i) {
    const cell = cells[i];
    if (cell.classList.contains("revealed") || cell.classList.contains("flag")) return;

    cell.classList.add("revealed");

    if (mines.has(i)) {
      cell.classList.add("mine");
      return;
    }

    const n = countMinesAround(i);
    if (n > 0) {
      cell.textContent = n;

      // Colores inline
      const colors = ["", "blue", "green", "red", "purple", "maroon", "turquoise", "black", "gray"];
      cell.style.color = colors[n];

    } else {
      expand(i);
    }
  }

  function expand(i) {
    const x = i % size;
    const y = Math.floor(i / size);

    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx;
        const ny = y + dy;

        if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
          const ni = ny * size + nx;
          if (!cells[ni].classList.contains("revealed")) reveal(ni);
        }
      }
    }
  }

  function showAllMines() {
    mines.forEach(i => {
      cells[i].classList.add("mine");
    });
  }

  for (let i = 0; i < total; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cells.push(cell);

    // Clic derecho → bandera
    cell.oncontextmenu = e => {
      e.preventDefault();
      if (minesGameOver) return;
      if (cell.classList.contains("revealed")) return;
      cell.classList.toggle("flag");
    };

    // Clic izquierdo → revelar
    cell.onclick = () => {
      if (minesGameOver) return;
      if (cell.classList.contains("flag")) return;

      if (mines.has(i)) {
        minesGameOver = true;
        showAllMines();
        msg2.textContent = "💥 ¡Has pisado una mina!";
        grid.style.pointerEvents = "none";
        return;
      }

      reveal(i);

      const revealed = document.querySelectorAll(".cell.revealed").length;
      if (revealed >= total - mineCount) {
        msg2.innerHTML = "<span class='victoria'>¡Ganaste!</span>";
        grid.style.pointerEvents = "none";
        setTimeout(() => victoria(2), 800);
      }
    };

    grid.appendChild(cell);
  }
}


/* ============================
   NIVEL 4 – SNAKE
============================ */
let snakeInterval = null;

function iniciarSnake() {
  clearInterval(snakeInterval);

  const canvas = document.getElementById("snakeCanvas");
  const ctx = canvas.getContext("2d");
  const msg4 = document.getElementById("msg4");
  msg4.textContent = "";

  const size = 20;
  const cells = 20;

  let snake = [
    { x: Math.floor(cells / 2), y: Math.floor(cells / 2) }
  ];
  let dir = "RIGHT";
  let food = { x: 5, y: 5 };

  function placeFood() {
    food = {
      x: Math.floor(Math.random() * cells),
      y: Math.floor(Math.random() * cells)
    };
  }

  placeFood();

 function onKey(e) {
  const k = e.key.toLowerCase();

  if ((k === "arrowup" || k === "w") && dir !== "DOWN") dir = "UP";
  if ((k === "arrowdown" || k === "s") && dir !== "UP") dir = "DOWN";
  if ((k === "arrowleft" || k === "a") && dir !== "RIGHT") dir = "LEFT";
  if ((k === "arrowright" || k === "d") && dir !== "LEFT") dir = "RIGHT";
}

  document.addEventListener("keydown", onKey);

  snakeInterval = setInterval(() => {
    let head = { ...snake[0] };

    if (dir === "UP") head.y--;
    if (dir === "DOWN") head.y++;
    if (dir === "LEFT") head.x--;
    if (dir === "RIGHT") head.x++;

    if (head.x < 0 || head.x >= cells || head.y < 0 || head.y >= cells) {
      gameOver();
      return;
    }

    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      if (snake.length >= 15) {
        win();
        return;
      }
      placeFood();
    } else {
      snake.pop();
    }

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0f0";
    snake.forEach(s => ctx.fillRect(s.x * size, s.y * size, size, size));

    ctx.fillStyle = "#f00";
    ctx.fillRect(food.x * size, food.y * size, size, size);
  }, 150);

  function gameOver() {
    clearInterval(snakeInterval);
    document.removeEventListener("keydown", onKey);
    msg4.textContent = "Has perdido";
  }

  function win() {
    clearInterval(snakeInterval);
    document.removeEventListener("keydown", onKey);
    msg4.innerHTML = "<span class='victoria'>¡Ganaste!</span>";
    setTimeout(() => victoria(4), 800);
  }
}

/* ============================
   NIVEL 5 – FLAPPY BIRD
============================ */
let flappyRunning = false;
let flappyInterval;
let birdFrame = 1;

function iniciarFlappy() {
  clearInterval(flappyInterval);

  const game = document.getElementById("flappyGame");
  const bird = document.getElementById("flappyBird");
  const pipeTop = document.getElementById("pipeTop");
  const pipeBottom = document.getElementById("pipeBottom");
  const scoreSpan = document.getElementById("flappyScore");
  const startScreen = document.getElementById("startScreen");
  const gameOverScreen = document.getElementById("gameOverScreen");
  const msg5 = document.getElementById("msg5");

  let birdY = 200;
  let velocity = 0;
  const gravity = 0.5;
  const jump = -8;

  let pipeX = 350;
  let gapY = 150;
  const gapSize = 150;

  let score = 0;
  scoreSpan.textContent = "0";
  msg5.textContent = "";

  startScreen.style.display = "block";
  gameOverScreen.style.display = "none";

  function randomGap() {
    gapY = 80 + Math.random() * 220;
  }

  function updatePipes() {
    pipeTop.style.left = pipeX + "px";
    pipeBottom.style.left = pipeX + "px";
    pipeTop.style.height = gapY + "px";
    pipeBottom.style.height = (500 - gapY - gapSize) + "px";
  }

  randomGap();
  updatePipes();

  function startGame() {
    if (flappyRunning) return;
    flappyRunning = true;
    startScreen.style.display = "none";

    flappyInterval = setInterval(() => {
      velocity += gravity;
      birdY += velocity;

      bird.style.top = birdY + "px";

      birdFrame = birdFrame === 1 ? 2 : 1;
      bird.className = "bird-frame-" + birdFrame;

      if (birdY + 30 > 500 - 60) return gameOver();

      pipeX -= 3;
      if (pipeX < -70) {
        pipeX = 350;
        randomGap();
        updatePipes();
        score++;
        scoreSpan.textContent = score;

        if (score >= 10) return win();
      } else updatePipes();

      const b = bird.getBoundingClientRect();
      const t = pipeTop.getBoundingClientRect();
      const d = pipeBottom.getBoundingClientRect();

      if (colision(b, t) || colision(b, d)) return gameOver();

    }, 20);
  }

  function gameOver()  {
    document.removeEventListener("keydown", flappyKey);
    clearInterval(flappyInterval);
    flappyRunning = false;
    gameOverScreen.style.display = "block";
  }

  function win() {
   document.removeEventListener("keydown", flappyKey);
    clearInterval(flappyInterval);
    flappyRunning = false;
    msg5.innerHTML = "<span class='victoria'>¡Ganaste!</span>";
    setTimeout(() => victoria(5), 800);
  }

  game.onclick = () => {
    if (!flappyRunning) startGame();
    velocity = jump;
  };

function flappyKey(e) {
  if (e.code === "Space") {
    if (!flappyRunning) startGame();
    velocity = jump;
  }
}

document.addEventListener("keydown", flappyKey);


}

function colision(a, b) {
  return !(
    a.right < b.left ||
    a.left > b.right ||
    a.bottom < b.top ||
    a.top > b.bottom
  );
}

/* ============================
   NIVEL 6 – DINO RUNNER
============================ */
let dinoInterval;

function iniciarDino() {
  clearInterval(dinoInterval);

  const dino = document.getElementById("dino");
  const cactus = document.getElementById("cactus");
  const scoreSpan = document.getElementById("dinoScore");
  const msg6 = document.getElementById("msg6");

  let score = 0;
  let speed = 6;

  cactus.style.right = "-50px";
  scoreSpan.textContent = "0";
  msg6.textContent = "";
  
document.addEventListener("keydown", e => {
  if (e.code === "Space" && !dino.classList.contains("jump")) {
    dino.classList.add("jump");
    setTimeout(()=>dino.classList.remove("jump"),600);
  }
});


  dinoInterval = setInterval(() => {
    let cactusRight = parseInt(cactus.style.right || "-50");
    cactusRight += speed;
    cactus.style.right = cactusRight + "px";

    if (cactusRight > 650) {
      cactus.style.right = "-50px";
      score++;
      scoreSpan.textContent = score;
      speed += 0.5;

      if (score >= 15) {
        clearInterval(dinoInterval);
        msg6.innerHTML = "<span class='victoria'>¡Ganaste!</span>";
        setTimeout(()=>victoria(6),800);
      }
    }

    const d = dino.getBoundingClientRect();
    const c = cactus.getBoundingClientRect();

    if (!(d.right < c.left || d.left > c.right || d.bottom < c.top || d.top > c.bottom)) {
      clearInterval(dinoInterval);
      msg6.textContent = "Has perdido";
    }

  }, 20);
}
</script>
</body>
</html>
