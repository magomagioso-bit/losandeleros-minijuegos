<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuegos con Niveles</title>
<style>
  body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }
  .hidden { display: none; }
  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    background: #ffcc00;
    color: black;
    transition: transform .1s;
  }
  button:active { transform: scale(0.95); }
  #nivelBox {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 22px;
  }
  .victoria {
    font-size: 28px;
    color: #00ff88;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Buscaminas */
  #minesGrid {
    display: grid;
    grid-template-columns: repeat(6, 40px);
    gap: 4px;
    justify-content: center;
    margin-top: 15px;
  }
  .cell {
    width: 40px;
    height: 40px;
    background: #333;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: bold;
  }
  .cell.revealed {
    background: #555;
    cursor: default;
  }
  .cell.mine {
    background: #ff4444;
  }
</style>
</head>
<body>

<div id="nivelBox">Nivel actual: <span id="nivel">1</span></div>

<div id="menu">
  <h1>Minijuegos</h1>
  <p>Completa cada nivel para desbloquear el siguiente.</p>
  <button onclick="jugar(1)">Nivel 1: Adivina el Número</button>
  <button onclick="jugar(2)" id="btn2" class="hidden">Nivel 2: Buscaminas</button>
  <button onclick="jugar(3)" id="btn3" class="hidden">Nivel 3: 3 en Raya</button>
</div>

<!-- NIVEL 1: ADIVINA EL NÚMERO -->
<div id="nivel1" class="hidden">
  <h2>Adivina el Número (1-50)</h2>
  <input type="number" id="num" placeholder="Tu número">
  <button onclick="comprobar()">Probar</button>
  <p id="msg1"></p>
</div>

<!-- NIVEL 2: BUSCAMINAS -->
<div id="nivel2" class="hidden">
  <h2>Buscaminas (6x6)</h2>
  <p>Haz clic en las casillas que NO tienen mina. Si explotas una, pierdes.</p>
  <div id="minesGrid"></div>
  <p id="msg2"></p>
</div>

<!-- NIVEL 3: 3 EN RAYA -->
<div id="nivel3" class="hidden">
  <h2>3 en Raya</h2>
  <div id="tablero" style="display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center;"></div>
  <p id="msg3"></p>
</div>

<script>
let nivel = 1;
let secreto = Math.floor(Math.random()*50)+1;
let intentos = 0;

const nivelSpan = document.getElementById("nivel");
const btn2 = document.getElementById("btn2");
const btn3 = document.getElementById("btn3");

function actualizarNivel() {
  nivelSpan.textContent = nivel;
  if (nivel >= 2) btn2.classList.remove("hidden");
  if (nivel >= 3) btn3.classList.remove("hidden");
}

function jugar(n) {
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("nivel"+n).classList.remove("hidden");
  if (n === 2) iniciarBuscaminas();
  if (n === 3) iniciar3Raya();
}

function victoria(n) {
  nivel++;
  actualizarNivel();
  alert("¡Nivel " + n + " completado! 🎉");
  document.getElementById("nivel"+n).classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

/* -------- NIVEL 1: ADIVINA -------- */
const msg1 = document.getElementById("msg1");
function comprobar() {
  const n = Number(document.getElementById("num").value);
  intentos++;
  if (n < secreto) msg1.textContent = "Más alto ⬆️";
  else if (n > secreto) msg1.textContent = "Más bajo ⬇️";
  else {
    msg1.innerHTML = "<span class='victoria'>¡Correcto! 🎉</span>";
    setTimeout(()=>victoria(1), 800);
  }
}

function iniciarBuscaminas() {
  grid.innerHTML = "";

  // generar minas
  while (mines.length < totalMines) {
    const r = Math.floor(Math.random()*totalCells);

    for (let c = -1; c <= 1; c++) {
      if (r === 0 && c === 0) continue;
      const nr = row + r;
      const nc = col + c;
      if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        neighbors.push(nr * size + nc);
      }
    }
  }
  return neighbors;
}

  return getNeighbors(index).filter(i => mines.includes(i)).length;
}

  cell.classList.add("revealed");

    cell.classList.add("mine");
    cell.textContent = "💣";
    msg2.textContent = "¡BOOM! Has pisado una mina 😵";
    // desactivar todo
    Array.from(document.getElementsByClassName("cell")).forEach(c => c.onclick = null);
    return;

        revealCell(neighborCell);
      }
    });
