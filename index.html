<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuegos con Niveles</title>
<style>
  body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }
  .hidden { display: none; }
  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    background: #ffcc00;
    color: black;
    transition: transform .1s;
  }
  button:active { transform: scale(0.95); }

  #nivelBox {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 22px;
  }

  #xpBox {
    background: #222;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 20px;
    color: #00ffcc;
  }

  .victoria {
    font-size: 28px;
    color: #00ff88;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Buscaminas */
  #minesGrid {
    display: grid;
    grid-template-columns: repeat(6, 40px);
    gap: 4px;
    justify-content: center;
    margin-top: 15px;
  }

  .cell {
    width: 40px;
    height: 40px;
    background: #333;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: bold;
  }

  .cell.revealed {
    background: #555;
    cursor: default;
  }

  .cell.mine {
    background: #ff4444;
  }
</style>
</head>
<body>

<div id="nivelBox">Nivel actual: <span id="nivel">1</span></div>
<div id="xpBox">XP: <span id="xp">0</span></div>

<div id="menu">
  <h1>Minijuegos</h1>
  <p>Completa cada nivel para desbloquear el siguiente.</p>
  <button onclick="jugar(1)">Nivel 1: Adivina el Número</button>
  <button onclick="jugar(2)" id="btn2" class="hidden">Nivel 2: Buscaminas</button>
  <button onclick="jugar(3)" id="btn3" class="hidden">Nivel 3: 3 en Raya</button>
</div>

<!-- NIVEL 1 -->
<div id="nivel1" class="hidden">
  <h2>Adivina el Número (1-50)</h2>
  <button onclick="volverMenu()">Volver al menú</button>
  <input type="number" id="num" placeholder="Tu número">
  <button onclick="comprobar()">Probar</button>
  <p id="msg1"></p>
</div>

<!-- NIVEL 2 -->
<div id="nivel2" class="hidden">
  <h2>Buscaminas (6x6)</h2>
  <button onclick="volverMenu()">Volver al menú</button>
  <p>Haz clic en las casillas que NO tienen mina.</p>
  <div id="minesGrid"></div>
  <p id="msg2"></p>
</div>

<!-- NIVEL 3 -->
<div id="nivel3" class="hidden">
  <h2>3 en Raya</h2>
  <button onclick="volverMenu()">Volver al menú</button>
  <div id="tablero" style="display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center;"></div>
  <p id="msg3"></p>
</div>

<script>

const nivelSpan = document.getElementById("nivel");
const btn2 = document.getElementById("btn2");
const btn3 = document.getElementById("btn3");

function volverMenu() {
  document.getElementById("nivel1").classList.add("hidden");
  document.getElementById("nivel2").classList.add("hidden");
  document.getElementById("nivel3").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

function ganarXP(cantidad) {
  xp += cantidad;
  xpSpan.textContent = xp;
}

function actualizarNivel() {
  nivelSpan.textContent = nivel;
  if (nivel >= 2) btn2.classList.remove("hidden");
  if (nivel >= 3) btn3.classList.remove("hidden");
}
